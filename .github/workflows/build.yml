name: Build & Release LIV

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            build_flag: --linux
            artifact_name: linux
          - os: windows-2022
            build_flag: --win
            artifact_name: windows
          - os: macos-14
            build_flag: --mac
            artifact_name: macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app
        run: npx electron-builder ${{ matrix.build_flag }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
            dist/*.yml
            dist/*.yaml
          if-no-files-found: warn

  release:
    needs: [build]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        id: collect
        run: |
          mkdir release_files
          find artifacts -type f \( -name "*.exe" -o -name "*.zip" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.yml" -o -name "*.yaml" \) -exec cp {} release_files/ \;
          ls -la release_files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Local Intelligence Vault ${{ github.ref_name }}
          body: |
            ## Local Intelligence Vault ${{ github.ref_name }}

            Lokale Dokumentensuche mit KI — 100% offline, kein Cloud-Zugriff.

            ### Download

            | Betriebssystem | Datei |
            |---|---|
            | Windows | `Local-Intelligence-Vault-Setup-*.exe` |
            | macOS | `Local-Intelligence-Vault-*.zip` |
            | Linux | `Local-Intelligence-Vault-*.AppImage` |

            ### Installation

            1. Passendes Binary herunterladen
            2. Installieren und starten
            3. *(Optional)* Ollama einrichten: `ollama pull llama3.2`

            ### Neu in dieser Version

            - Semantische Dokumentensuche (lokal, keine Cloud)
            - Ollama-Integration für KI-Antworten (GPU-beschleunigt)
            - Native Dateiöffnung (PDF, TXT, MD)
            - Auto-Update-Funktion
          files: release_files/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
